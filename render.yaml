services:
  - type: web
    name: performance-appraisal-system
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: node dist/server.cjs
    healthCheckPath: /api/auth/me
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
